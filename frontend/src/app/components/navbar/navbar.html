<nav class="navbar">
  <div class="nav-brand" routerLink="/">
    <span class="logo">zine-maker ✨</span>
  </div>

  <div class="nav-links" *ngIf="!(authService.user$ | async)">
    <a routerLink="/login" class="nav-item">login</a>
    <a routerLink="/signup" class="btn-signup">sign up</a>
  </div>

  <div class="nav-user" *ngIf="authService.user$ | async">
    <div class="user-icon" (click)="toggleMenu()">
      <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Felix" alt="User avatar">
    </div>

    <div class="dropdown-menu" *ngIf="isMenuOpen">
      <a routerLink="/dashboard" (click)="isMenuOpen = false">dashboard</a>
      <a routerLink="/profile" (click)="isMenuOpen = false">profile</a>
      <a routerLink="/settings" (click)="isMenuOpen = false">settings</a>
      <hr>
      <a (click)="logout()" class="logout">logout</a>
    </div>
  </div>
</nav>
